blueprint:
  name: "🏰 Yet Another Automatic HVAC Control Blueprint (YAAHCB) - Multi-Zone KISS Edition"
  description: >
    Turns off the HVAC when a window or door is opened (binary sensor 'on'), with
    optional notifications for high humidity, low pressure, and temperature.
    Restores the climate state when windows are closed. Starts a timer before
    turning off the HVAC for energy-saving purposes.

    Supports multi-zone HVAC: pass multiple climate entities and the automation
    will control only the ones whose Home Assistant area matches the window that
    triggered it. Set Zone Mode to "shared" to fall back to single-pool behavior.
  domain: automation
  input:
    climate_entities:
      name: Climate Entities (Multi-Zone)
      description: >
        One or more HVAC systems to manage. In "area" zone mode, only entities
        whose area matches the triggering window's area are controlled.
      default: []
      selector:
        entity:
          domain: climate
          multiple: true
    climate_entity:
      name: Climate Entity (Legacy / Optional)
      description: >
        Deprecated - prefer Climate Entities. If set, it is merged into the
        multi-zone list. Leave empty for new installs.
      default: ""
      selector:
        entity:
          domain: climate
    zone_mode:
      name: Zone Mode
      description: >
        "area": match windows to climate entities by HA area (true multi-zone).
        "shared": any open window turns off every listed climate entity.
      default: area
      selector:
        select:
          options:
          - area
          - shared
    window_sensors:
      name: Window/Door Sensors
      description: >
        The sensors that detect open windows or doors. Assign each sensor to a
        Home Assistant area to enable area-based zoning.
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    temperature_sensor:
      name: Outside Temperature Sensor
      description: Optional sensor for measuring outdoor temperature.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: temperature
    humidity_sensor:
      name: Outside Humidity Sensor
      description: Optional sensor for measuring outdoor humidity.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: humidity
    pressure_sensor:
      name: Atmospheric Pressure Sensor
      description: Optional sensor for measuring atmospheric pressure.
      default: ""
      selector:
        entity:
          domain: sensor
          device_class: atmospheric_pressure
    humidity_threshold:
      name: Humidity Threshold
      description: Threshold for high humidity notifications.
      default: 60
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          step: 1
    pressure_threshold:
      name: Pressure Threshold
      description: Threshold for low pressure notifications.
      default: 1000
      selector:
        number:
          min: 900
          max: 1050
          unit_of_measurement: "hPa"
          step: 1
    notify_device:
      name: Notify Device
      description: Device to send notifications to.
      selector:
        device:
          integration: mobile_app
    window_open_timer:
      name: Timer for Window Open Notification
      description: Timer entity used as the countdown when a window opens.
      selector:
        entity:
          domain: timer
    temp_high_threshold:
      name: High Temperature Threshold
      description: Above this outdoor temperature, HVAC turns off immediately on window open.
      default: 25
      selector:
        number:
          min: 15
          max: 40
          unit_of_measurement: "°C"
          step: 0.5
    temp_low_threshold:
      name: Low Temperature Threshold
      description: Below this outdoor temperature, HVAC turns off immediately on window open.
      default: 15
      selector:
        number:
          min: -5
          max: 20
          unit_of_measurement: "°C"
          step: 0.5
    daytime_hvac_timeout:
      name: Daytime HVAC Off Timeout
      description: How long to wait before turning off the HVAC during the day.
      selector:
        duration:
          enable_day: false
    nighttime_hvac_timeout:
      name: Nighttime HVAC Off Timeout
      description: How long to wait before turning off the HVAC during the night.
      selector:
        duration:
          enable_day: false
    night_check_time:
      name: Nighttime Check Time
      description: Time to check whether any windows are still open before bed.
      selector:
        time:
    night_start_time:
      name: Night Period Start
      description: When the night period starts.
      selector:
        time:
    night_end_time:
      name: Night Period End
      description: When the night period ends.
      selector:
        time:
    require_temperature_sensor:
      name: Require Temperature Sensor
      description: If enabled, the automation will not run without a valid temperature sensor.
      default: false
      selector:
        boolean:
    debug_mode:
      name: Debug Mode
      description: Emit extra logbook entries to help troubleshoot.
      default: false
      selector:
        boolean:
    restore_climate_state:
      name: Remember Previous Climate State
      description: Call climate.turn_on to let HA restore the previous HVAC mode instead of forcing "auto".
      default: true
      selector:
        boolean:
    seasonal_mode:
      name: Seasonal Mode
      description: >
        "auto" always acts on open windows. "summer" only acts when outdoor temp
        is above the high threshold. "winter" only acts when outdoor temp is
        below the low threshold.
      default: auto
      selector:
        select:
          options:
          - auto
          - summer
          - winter
    notification_cooldown:
      name: Notification Cooldown
      description: Minimum minutes between repeat open-window notifications for the same window.
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: "min"
    notification_throttle_store:
      name: Notification Throttle Helper (Optional)
      description: >
        Optional input_datetime helper used to store the last notification time.
        When empty, the cooldown is skipped (notifications fire every time).
      default: ""
      selector:
        entity:
          domain: input_datetime

variables:
  humidity_sensor: !input humidity_sensor
  pressure_sensor: !input pressure_sensor
  temperature_sensor: !input temperature_sensor
  humidity_threshold: !input humidity_threshold
  pressure_threshold: !input pressure_threshold
  temp_high_threshold: !input temp_high_threshold
  temp_low_threshold: !input temp_low_threshold
  window_open_timer: !input window_open_timer
  window_sensors: !input window_sensors
  climate_entities_input: !input climate_entities
  climate_entity_legacy: !input climate_entity
  zone_mode: !input zone_mode
  seasonal_mode: !input seasonal_mode
  restore_climate_state: !input restore_climate_state
  debug_mode: !input debug_mode
  require_temperature_sensor: !input require_temperature_sensor
  notification_cooldown: !input notification_cooldown
  notification_throttle_store: !input notification_throttle_store
  night_check_time: !input night_check_time
  night_start_time: !input night_start_time
  night_end_time: !input night_end_time
  daytime_hvac_timeout: !input daytime_hvac_timeout
  nighttime_hvac_timeout: !input nighttime_hvac_timeout

  all_climates: >
    {% set legacy = [climate_entity_legacy] if climate_entity_legacy else [] %}
    {{ (climate_entities_input + legacy) | unique | list }}

  temp_sensor_available: >
    {{ temperature_sensor | length > 0
       and states(temperature_sensor) not in ['unknown', 'unavailable', 'none', None]
       and states(temperature_sensor) | float(-999) > -998 }}

  trigger_entity: >
    {{ trigger.entity_id if trigger is defined and trigger.entity_id is defined else '' }}

  trigger_area: >
    {{ area_id(trigger_entity) if trigger_entity else none }}

  trigger_area_label: >
    {{ area_name(trigger_entity) if trigger_entity else 'your home' }}

  trigger_friendly: >
    {{ state_attr(trigger_entity, 'friendly_name') or trigger_entity or 'a window' }}

  affected_climates: >
    {% if zone_mode == 'shared' or not trigger_area %}
      {{ all_climates }}
    {% else %}
      {% set ns = namespace(result=[]) %}
      {% for c in all_climates %}
        {% if area_id(c) == trigger_area %}
          {% set ns.result = ns.result + [c] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}

  zone_windows: >
    {% if zone_mode == 'shared' or not trigger_area %}
      {{ window_sensors }}
    {% else %}
      {% set ns = namespace(result=[]) %}
      {% for w in window_sensors %}
        {% if area_id(w) == trigger_area %}
          {% set ns.result = ns.result + [w] %}
        {% endif %}
      {% endfor %}
      {{ ns.result }}
    {% endif %}

  zone_windows_open_count: >
    {{ expand(zone_windows) | selectattr('state', 'eq', 'on') | list | count }}

  any_window_open: >
    {{ expand(window_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}

  open_windows_names: >
    {{ expand(window_sensors)
       | selectattr('state', 'eq', 'on')
       | map(attribute='name')
       | list
       | join(', ') }}

  is_night_time: >
    {% set nh = night_start_time.split(':')[0] | int %}
    {% set eh = night_end_time.split(':')[0] | int %}
    {% set h = now().hour %}
    {{ h >= nh or h < eh }}

  active_hvac_timeout: >
    {{ nighttime_hvac_timeout if is_night_time else daytime_hvac_timeout }}

  outside_temp: >
    {{ states(temperature_sensor) | float(0) if temp_sensor_available else none }}

  outside_temp_extreme: >
    {% if temp_sensor_available %}
      {{ outside_temp > temp_high_threshold or outside_temp < temp_low_threshold }}
    {% else %}
      {{ false }}
    {% endif %}

  seasonal_allows_action: >
    {% if seasonal_mode == 'auto' %}
      {{ true }}
    {% elif not temp_sensor_available %}
      {{ true }}
    {% elif seasonal_mode == 'summer' %}
      {{ outside_temp > temp_high_threshold }}
    {% elif seasonal_mode == 'winter' %}
      {{ outside_temp < temp_low_threshold }}
    {% else %}
      {{ true }}
    {% endif %}

  timer_duration_label: >
    {% set d = state_attr(window_open_timer, 'duration') %}
    {% if d %}
      {{ (as_timedelta(d).total_seconds() / 60) | round(0, 'floor') | int }} min
    {% else %}
      a few minutes
    {% endif %}

  cooldown_ok: >
    {% if notification_throttle_store | length == 0 or notification_cooldown == 0 %}
      {{ true }}
    {% else %}
      {% set last = states(notification_throttle_store) %}
      {% if last in ['unknown', 'unavailable', 'none', None] %}
        {{ true }}
      {% else %}
        {{ (as_timestamp(now()) - as_timestamp(last, 0)) / 60 > notification_cooldown }}
      {% endif %}
    {% endif %}

trigger:
- platform: state
  entity_id: !input window_sensors
  from: "off"
  to: "on"
- platform: state
  entity_id: !input window_sensors
  from: "on"
  to: "off"
- platform: event
  event_type: timer.finished
  event_data:
    entity_id: !input window_open_timer
- platform: time
  at: !input night_check_time

condition:
- condition: template
  value_template: >
    {{ (not require_temperature_sensor) or temp_sensor_available }}

action:
- choose:

  # -----------------------------------------------------------------
  # BLOCK 1 - window opened (or timer fired while a window is still open)
  # -----------------------------------------------------------------
  - conditions:
    - condition: template
      value_template: >
        {{ (trigger.platform == 'state' and trigger.to_state.state == 'on')
           or (trigger.platform == 'event'
               and trigger.event.event_type == 'timer.finished'
               and expand(window_sensors) | selectattr('state','eq','on') | list | count > 0) }}
    - condition: template
      value_template: "{{ seasonal_allows_action }}"
    sequence:

    # Debug logbook entry
    - if:
        condition: template
        value_template: "{{ debug_mode }}"
      then:
      - service: logbook.log
        data:
          name: HVAC Blueprint
          message: >
            Window event from {{ trigger_friendly }} (area={{ trigger_area_label }}).
            Affected climates: {{ affected_climates | join(', ') or 'none' }}.
            zone_mode={{ zone_mode }}, outside_temp={{ outside_temp }}.

    # Start the shared timer only if it's idle (one countdown at a time is fine
    # for most homes; users with heavy multi-zone needs can still deploy the
    # blueprint once per zone with a separate timer each).
    - if:
        condition: state
        entity_id: !input window_open_timer
        state: "idle"
      then:
      - service: timer.start
        target:
          entity_id: !input window_open_timer

    # Open-window notification (respects cooldown if a throttle helper is set)
    - if:
        condition: template
        value_template: "{{ cooldown_ok }}"
      then:
      - device_id: !input notify_device
        domain: mobile_app
        type: notify
        message: >
          🚪 {{ trigger_friendly }} ({{ trigger_area_label }}) is open.
          {% if temp_sensor_available %}Outside: {{ outside_temp }}°C.{% endif %}
          {% if temp_sensor_available and outside_temp < temp_low_threshold %}
          Please close within {{ timer_duration_label }} to conserve energy.
          {% endif %}
      - if:
          condition: template
          value_template: "{{ notification_throttle_store | length > 0 }}"
        then:
        - service: input_datetime.set_datetime
          target:
            entity_id: "{{ notification_throttle_store }}"
          data:
            datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    # Humidity advisory
    - if:
        condition: and
        conditions:
        - condition: template
          value_template: "{{ humidity_sensor | length > 0 }}"
        - condition: template
          value_template: >
            {{ states(humidity_sensor) not in ['unknown','unavailable','none',None]
               and states(humidity_sensor) | float(0) > humidity_threshold }}
      then:
      - device_id: !input notify_device
        domain: mobile_app
        type: notify
        message: >
          💧 Humidity is {{ states(humidity_sensor) | float }}%, above the
          {{ humidity_threshold }}% threshold.

    # Pressure advisory
    - if:
        condition: and
        conditions:
        - condition: template
          value_template: "{{ pressure_sensor | length > 0 }}"
        - condition: template
          value_template: >
            {{ states(pressure_sensor) not in ['unknown','unavailable','none',None]
               and states(pressure_sensor) | float(9999) < pressure_threshold }}
      then:
      - device_id: !input notify_device
        domain: mobile_app
        type: notify
        message: >
          🌧️ Pressure is {{ states(pressure_sensor) | float }} hPa, below the
          {{ pressure_threshold }} hPa threshold. Weather may be changing.

    # ---- HVAC off path (immediate vs timed, merged day/night) ----
    - if:
        condition: template
        value_template: "{{ affected_climates | count > 0 }}"
      then:
      - choose:
        # Immediate shutoff when outdoor temp is out of comfort band
        - conditions:
          - condition: template
            value_template: "{{ outside_temp_extreme }}"
          sequence:
          - service: climate.turn_off
            target:
              entity_id: "{{ affected_climates }}"
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: >
              ❄️ HVAC off (zone: {{ trigger_area_label }}) because outside is
              {{ outside_temp }}°C - outside the comfort band.
        default:
          # Delayed shutoff - timeout depends on is_night_time
          - delay: "{{ active_hvac_timeout }}"
          # Re-check: is any window in THIS zone still open?
          - condition: template
            value_template: >
              {{ expand(zone_windows) | selectattr('state','eq','on') | list | count > 0 }}
          - service: climate.turn_off
            target:
              entity_id: "{{ affected_climates }}"
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            message: >
              ⏱️ Window in {{ trigger_area_label }} stayed open for
              {{ (active_hvac_timeout.seconds // 60) if active_hvac_timeout.seconds is defined
                 else (as_timedelta(active_hvac_timeout).total_seconds() / 60) | int }}
              min during {{ 'nighttime' if is_night_time else 'daytime' }}.
              HVAC has been turned off.

  # -----------------------------------------------------------------
  # BLOCK 2 - window closed
  # -----------------------------------------------------------------
  - conditions:
    - condition: template
      value_template: >
        {{ trigger.platform == 'state' and trigger.to_state.state == 'off' }}
    sequence:
    - service: timer.cancel
      target:
        entity_id: !input window_open_timer

    - if:
        condition: template
        value_template: "{{ debug_mode }}"
      then:
      - service: logbook.log
        data:
          name: HVAC Blueprint
          message: >
            {{ trigger_friendly }} closed. zone={{ trigger_area_label }},
            zone_windows_still_open={{ zone_windows_open_count }},
            affected_climates={{ affected_climates | join(', ') or 'none' }}.

    # Only restore if every window in the affected zone is now closed
    - if:
        condition: template
        value_template: >
          {{ zone_windows_open_count == 0 and affected_climates | count > 0 }}
      then:
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ restore_climate_state }}"
          sequence:
          # climate.turn_on lets each integration restore its prior hvac_mode
          - service: climate.turn_on
            target:
              entity_id: "{{ affected_climates }}"
        default:
        - service: climate.set_hvac_mode
          target:
            entity_id: "{{ affected_climates }}"
          data:
            hvac_mode: "auto"
      - device_id: !input notify_device
        domain: mobile_app
        type: notify
        message: >
          ✅ {{ trigger_friendly }} closed. All windows in
          {{ trigger_area_label }} are closed. HVAC restored
          {% if restore_climate_state %}to its previous mode{% else %}to auto{% endif %}.
    - if:
        condition: template
        value_template: "{{ zone_windows_open_count > 0 }}"
      then:
      - device_id: !input notify_device
        domain: mobile_app
        type: notify
        message: >
          ℹ️ {{ trigger_friendly }} closed. Still open in
          {{ trigger_area_label }}:
          {{ expand(zone_windows) | selectattr('state','eq','on')
             | map(attribute='name') | list | join(', ') }}.

  # -----------------------------------------------------------------
  # BLOCK 3 - timer finished reminder (window still open somewhere)
  # -----------------------------------------------------------------
  - conditions:
    - condition: template
      value_template: >
        {{ trigger.platform == 'event'
           and trigger.event.event_type == 'timer.finished'
           and trigger.event.data.entity_id == window_open_timer }}
    - condition: template
      value_template: "{{ any_window_open }}"
    sequence:
    - device_id: !input notify_device
      domain: mobile_app
      type: notify
      message: >
        {% if temp_sensor_available and outside_temp < 15 %}🥶{% else %}⏱️{% endif %}
        Reminder: these windows are still open after {{ timer_duration_label }}:
        {{ open_windows_names }}.
        {% if temp_sensor_available %}Outside: {{ outside_temp }}°C.{% endif %}

  # -----------------------------------------------------------------
  # BLOCK 4 - nightly pre-bed check
  # -----------------------------------------------------------------
  - conditions:
    - condition: template
      value_template: "{{ trigger.platform == 'time' }}"
    - condition: template
      value_template: "{{ any_window_open }}"
    sequence:
    - device_id: !input notify_device
      domain: mobile_app
      type: notify
      message: >
        🌙 Night check: windows still open before bed:
        {{ open_windows_names }}.
        {% if temp_sensor_available %}Outside: {{ outside_temp }}°C.{% endif %}
        Night period starts at {{ night_start_time }}.

mode: restart
